<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Scan</title>
  <link rel="stylesheet" href="{{asset "/static/app.css"}}">
</head>
<body class="scan-page">
  {{template "nav" .}}
  <main class="scanner">
    <section class="camera-stage">
      <video id="camera" playsinline autoplay muted></video>
    </section>
    <section class="scanner-tools">
      <button id="startCamera">Open camera</button>
      <button id="capturePage">Capture page</button>
      <button id="uploadScan">Create PDF</button>
      <span id="scanStatus">0 pages</span>
    </section>
    <section class="scan-editor">
      <div class="edit-stage">
        <canvas id="pageEditor"></canvas>
      </div>
      <section id="pages" class="page-strip"></section>
    </section>
  </main>
  <script src="{{asset "/static/scanner.js"}}"></script>
</body>
</html>
